name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -x build-essential

    - name: Build
      run: make

    - name: Run tests
      run: make test

    - name: Build raw utility
      run: make nova_raw
